name: Build Windows EXE

on:
  push:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pygame pymunk pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name pixel_racer --windowed main.py

      - name: Create ZIP archive
        run: Compress-Archive -Path dist/pixel_racer.exe -DestinationPath pixel_racer_windows.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pixel_racer_windows
          path: pixel_racer_windows.zip

      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: pixel_racer_windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
